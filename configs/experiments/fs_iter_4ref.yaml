# ============================================================================
# 10. Few-shot iterative, 4 refs, no refinement
# Best iterative config without refinement. Compare vs config 7 (indep 4ref).
# ============================================================================
experiment:
  name: fs_iter_4ref
  description: "Few-shot iterative, 4 references, no refinement"

mode: few_shot

dataset:
  name: "XRayNicoSent/images"
  extensions: ["png"]
  max_images: 100

segmenter:
  model: medsam2
  device: cuda
  grid_side: 6
  score_threshold: 0.50
  iou_threshold: 0.50

extractor:
  method: moments
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]

labeler:
  algorithm: "kmeans"
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]
  kmeans:
    n_clusters: 3
    random_state: 42

cluster_filter:
  min_image_frequency: 0.3
  min_avg_labeling_confidence: 0.5
  min_avg_sam_confidence: 0.6
  deduplicate_per_image: true
  dedup_sam_score_weight: 0.2

refinement:
  enabled: false

few_shot:
  references_dir: "data/few_shot/xray"
  propagation_mode: iterative
  references:
    - image: "1256842362861431725328351539259305635_u1qifz/image.png"
      masks:
        left_lung: "1256842362861431725328351539259305635_u1qifz/left_lung.png"
        right_lung: "1256842362861431725328351539259305635_u1qifz/right_lung.png"
        heart: "1256842362861431725328351539259305635_u1qifz/heart.png"
    - image: "10155709300728342918543955138521808206_f7cj92/image.png"
      masks:
        left_lung: "10155709300728342918543955138521808206_f7cj92/left_lung.png"
        right_lung: "10155709300728342918543955138521808206_f7cj92/right_lung.png"
        heart: "10155709300728342918543955138521808206_f7cj92/heart.png"
    - image: "137388819814035428537164273550346941304_uaixht/image.png"
      masks:
        left_lung: "137388819814035428537164273550346941304_uaixht/left_lung.png"
        right_lung: "137388819814035428537164273550346941304_uaixht/right_lung.png"
        heart: "137388819814035428537164273550346941304_uaixht/heart.png"
    - image: "104055072637907464008767269203861924017_huh41k/image.png"
      masks:
        left_lung: "104055072637907464008767269203861924017_huh41k/left_lung.png"
        right_lung: "104055072637907464008767269203861924017_huh41k/right_lung.png"
        heart: "104055072637907464008767269203861924017_huh41k/heart.png"

output:
  results_dir: "results/fs_iter_4ref"