experiment:
  name: exp02_sunnybrook_clustering_moments
  description: "Unsupervised organ labeling using shape moment features and K-Means clustering"

dataset:
  name: "sunnybrook"
  extensions: ["png", "jpg"] # file extensions to load
  max_images: null # load all images

segmenter:
  device: cuda
  grid_side: 6
  score_threshold: 0.50
  iou_threshold: 0.50

extractor:
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]

labeler:
  algorithm: "kmeans"
  n_clusters: 6
  random_state: 42
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]

output:
  results_dir: "results/exp02"