experiment:
  name: exp03_sunnybrook_clustering_dbscan
  description: "Unsupervised organ labeling using shape moment features and DBSCAN clustering"

dataset:
  name: "sunnybrook"
  extensions: ["png", "jpg"]
  max_images: 50

segmenter:
  device: cuda
  grid_side: 6
  score_threshold: 0.50
  iou_threshold: 0.50

extractor:
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]

labeler:
  algorithm: "dbscan"
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]
  dbscan:
    eps: 0.1
    min_samples: 2

cluster_filter:
  min_image_frequency: 0.0
  min_avg_labeling_confidence: 0.0
  min_avg_sam_confidence: 0.0

output:
  results_dir: "results/exp03"