# ============================================================================
# 4. Unsupervised — HDBSCAN + refinement
# Measures refinement impact on HDBSCAN. Compare vs config 2.
# ============================================================================
experiment:
  name: unsup_hdbscan_refine
  description: "Unsupervised — HDBSCAN + recovery + improvement"

mode: unsupervised

dataset:
  extensions: ["png"]

segmenter:
  model: medsam2
  device: cuda
  grid_side: 6
  score_threshold: 0.50
  iou_threshold: 0.50

extractor:
  method: moments
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]

labeler:
  algorithm: "hdbscan"
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]
  hdbscan:
    min_cluster_size_fraction: 0.3
    min_samples_fraction: 0.1

cluster_filter:
  min_image_frequency: 0.3
  min_avg_labeling_confidence: 0.5
  min_avg_sam_confidence: 0.6
  deduplicate_per_image: true
  dedup_sam_score_weight: 0.2

refinement:
  enabled: true
  min_cluster_confidence: 0.5
  min_image_frequency: 0.3
  mask_selection:
    sam_score_weight: 0.5
    min_combined_score: 0.5
    num_reference_frames: 3
  improve_existing: true
  improve_min_combined_score: 1.0
  improve_sam_score_weight: 0.2