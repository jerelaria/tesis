# ============================================================================
# 2. Unsupervised — HDBSCAN, no refinement
# Compare clustering algorithm vs config 1.
# ============================================================================
experiment:
  name: unsup_hdbscan
  description: "Unsupervised — grid + HDBSCAN, no refinement"

mode: unsupervised

dataset:
  name: "XRayNicoSent/images"
  extensions: ["png"]
  max_images: 100

segmenter:
  model: medsam2
  device: cuda
  grid_side: 6
  score_threshold: 0.50
  iou_threshold: 0.50

extractor:
  method: moments
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]

labeler:
  algorithm: "hdbscan"
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]
  hdbscan:
    min_cluster_size: 15
    min_samples: 5

cluster_filter:
  min_image_frequency: 0.3
  min_avg_labeling_confidence: 0.5
  min_avg_sam_confidence: 0.6
  deduplicate_per_image: true
  dedup_sam_score_weight: 0.2

refinement:
  enabled: false

output:
  results_dir: "results/unsup_hdbscan"