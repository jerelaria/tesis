# ============================================================================
# 6. Few-shot independent, 1 ref + refinement
# Does refinement help few-shot? Compare vs config 5.
# ============================================================================
experiment:
  name: fs_indep_1ref_refine
  description: "Few-shot independent, 1 ref + recovery + improvement"

mode: few_shot

dataset:
  name: "XRayNicoSent/images"
  extensions: ["png"]
  max_images: 100

segmenter:
  model: medsam2
  device: cuda
  grid_side: 6
  score_threshold: 0.50
  iou_threshold: 0.50

extractor:
  method: moments
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]

labeler:
  algorithm: "kmeans"
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]
  kmeans:
    n_clusters: 3
    random_state: 42

cluster_filter:
  min_image_frequency: 0.3
  min_avg_labeling_confidence: 0.5
  min_avg_sam_confidence: 0.6
  deduplicate_per_image: true
  dedup_sam_score_weight: 0.2

refinement:
  enabled: true
  min_cluster_confidence: 0.5
  min_image_frequency: 0.3
  mask_selection:
    sam_score_weight: 0.5
    min_combined_score: 0.5
    num_reference_frames: 3
  improve_existing: true
  improve_min_combined_score: 1.0
  improve_sam_score_weight: 0.2

few_shot:
  references_dir: "data/few_shot/xray"
  propagation_mode: independent
  references:
    - image: "1256842362861431725328351539259305635_u1qifz/image.png"
      masks:
        left_lung: "1256842362861431725328351539259305635_u1qifz/left_lung.png"
        right_lung: "1256842362861431725328351539259305635_u1qifz/right_lung.png"
        heart: "1256842362861431725328351539259305635_u1qifz/heart.png"

output:
  results_dir: "results/fs_indep_1ref_refine"