# ============================================================================
# Few-shot independent baseline: raw MedSAM2 output, no post-processing.
# Ablation anchor: isolates the contribution of clustering, semantic mapping,
# refinement, and cluster filtering on top of plain few-shot MedSAM2.
# Compare vs fs_indep, fs_indep_refine, fs_iter, fs_iter_refine.
# ============================================================================
experiment:
  name: fs_indep_baseline
  description: "Few-shot independent, raw MedSAM2 output (no post-processing)"

mode: few_shot

dataset:
  extensions: ["png"]

segmenter:
  model: medsam2
  device: cuda
  grid_side: 6
  score_threshold: 0.50
  iou_threshold: 0.50

extractor:
  method: moments
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]

few_shot:
  propagation_mode: independent
  clustering_enabled: false