dataset:
  name: "xray"
  extensions: ["png", "jpg"] # file extensions to load

segmenter:
  device: cuda
  grid_side: 6
  score_threshold: 0.50
  iou_threshold: 0.50

extractor:
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]

labeler:
  algorithm: "kmeans"
  n_clusters: 2
  random_state: 42
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]

output:
  results_dir: "results/exp01"