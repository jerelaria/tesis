# ============================================================================
# fs_iter_4ref_refine.yaml — Few-shot iterative, 4 refs + refinement
# ============================================================================
experiment:
  name: fs_iter_4ref_refine
  description: "Few-shot iterative, 4 refs + refinement"

mode: few_shot

dataset:
  name: "XRayNicoSent/images"
  extensions: ["png"]
  max_images: 100

segmenter:
  model: medsam2
  device: cuda
  grid_side: 6
  score_threshold: 0.50
  iou_threshold: 0.50

extractor:
  method: moments
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]

labeler:
  algorithm: "dbscan"
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]
  kmeans:
    n_clusters: 6
    random_state: 42
  dbscan:
    eps: 0.191
    min_samples: 2
  hdbscan:
    min_cluster_size: 2
    min_samples: 1

cluster_filter:
  min_image_frequency: 0.3
  min_avg_labeling_confidence: 0.5
  min_avg_sam_confidence: 0.6

refinement:
  enabled: true
  min_cluster_confidence: 0.5
  min_image_frequency: 0.3
  mask_selection:
    sam_score_weight: 0.5
    min_combined_score: 0.5
    num_reference_frames: 3

few_shot:
  references_dir: "data/few_shot/xray"
  propagation_mode: iterative
  references:
    - image: "1256842362861431725328351539259305635_u1qifz/image.png"
      masks:
        left_lung: "1256842362861431725328351539259305635_u1qifz/lung_1.png"
        right_lung: "1256842362861431725328351539259305635_u1qifz/lung_2.png"
        heart: "1256842362861431725328351539259305635_u1qifz/heart_1.png"
    - image: "10155709300728342918543955138521808206_f7cj92/image.png"
      masks:
        left_lung: "10155709300728342918543955138521808206_f7cj92/lung_1.png"
        right_lung: "10155709300728342918543955138521808206_f7cj92/lung_2.png"
        heart: "10155709300728342918543955138521808206_f7cj92/heart_1.png"
    - image: "137388819814035428537164273550346941304_uaixht/image.png"
      masks:
        left_lung: "137388819814035428537164273550346941304_uaixht/lung_1.png"
        right_lung: "137388819814035428537164273550346941304_uaixht/lung_2.png"
        heart: "137388819814035428537164273550346941304_uaixht/heart_1.png"
    - image: "104055072637907464008767269203861924017_huh41k/image.png"
      masks:
        left_lung: "104055072637907464008767269203861924017_huh41k/lung_1.png"
        right_lung: "104055072637907464008767269203861924017_huh41k/lung_2.png"
        heart: "104055072637907464008767269203861924017_huh41k/heart_1.png"

output:
  results_dir: "results/fs_iter_4ref_refine"
