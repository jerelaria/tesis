# ============================================================================
# 12. Text-guided — MedSAM3 + clustering validation
# Upper bound comparison. No manual masks needed.
# ============================================================================
experiment:
  name: tg
  description: "Text-guided MedSAM3 + clustering validation"

mode: text_guided

dataset:
  extensions: ["png"]

segmenter:
  model: medsam3
  device: cuda

extractor:
  method: moments
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]

labeler:
  algorithm: "kmeans"
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]
  kmeans:
    n_clusters: 3
    random_state: 42

cluster_filter:
  min_image_frequency: 0.3
  min_avg_labeling_confidence: 0.5
  min_avg_sam_confidence: 0.6
  deduplicate_per_image: true
  dedup_sam_score_weight: 0.2

text_guided:
  prompts: ["lung", "heart"]
  clustering_enabled: true