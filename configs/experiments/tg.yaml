# ============================================================================
# tg.yaml — Text-guided with MedSAM3, DBSCAN clustering
# ============================================================================
experiment:
  name: tg
  description: "Text-guided MedSAM3 + DBSCAN clustering validation"

mode: text_guided

dataset:
  name: "XRayNicoSent/images"
  extensions: ["png"]
  max_images: 100

segmenter:
  model: medsam3
  device: cuda

extractor:
  method: moments
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]

labeler:
  algorithm: "dbscan"
  features: ["V", "Cx", "Cy", "Dx", "Dy", "L"]
  kmeans:
    n_clusters: 6
    random_state: 42
  dbscan:
    eps: 0.191
    min_samples: 2
  hdbscan:
    min_cluster_size: 2
    min_samples: 1

cluster_filter:
  min_image_frequency: 0.3
  min_avg_labeling_confidence: 0.5
  min_avg_sam_confidence: 0.6

text_guided:
  prompts: ["lung", "heart"]
  clustering_enabled: true

output:
  results_dir: "results/tg"
